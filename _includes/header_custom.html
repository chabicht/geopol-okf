<button id="theme-toggle" type="button" aria-label="Switch color theme" title="Switch color theme (light / dark / auto)"
        style="margin-left:0.5rem;background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;padding:0.25rem;color:inherit;"
        onclick="window.cycleTheme && window.cycleTheme();">&#9728;</button>
